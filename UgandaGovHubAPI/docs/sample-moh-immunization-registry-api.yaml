openapi: 3.0.3
info:
  title: Ministry of Health Immunization Registry API
  version: 1.0.0
  description: Sandbox API for verifying citizen immunization status against a Ministry of Health registry.
servers:
  - url: http://localhost:4000/api/v1/health/immunization
    description: GovHub local sandbox
tags:
  - name: Immunization
    description: Immunization registry verification services
paths:
  /status/{nin}:
    get:
      tags:
        - Immunization
      summary: Check immunization status by NIN
      description: Returns a high-level immunization status for a citizen without exposing full clinical records.
      operationId: getImmunizationStatus
      security:
        - GovHubApiKey: []
      parameters:
        - name: nin
          in: path
          required: true
          description: National Identification Number.
          schema:
            type: string
            example: CM99021234567X
        - name: vaccine
          in: query
          required: false
          description: Optional vaccine code to check a specific immunization.
          schema:
            type: string
            enum:
              - BCG
              - OPV
              - DPT
              - MMR
              - COVID19
      responses:
        "200":
          description: Immunization status found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImmunizationStatus"
              examples:
                complete:
                  value:
                    nin: CM99021234567X
                    status: COMPLETE
                    last_updated: "2026-02-18"
                    verified: true
        "404":
          description: Citizen record not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /certificate/verify:
    post:
      tags:
        - Immunization
      summary: Verify an immunization certificate
      description: Confirms whether an immunization certificate number matches a citizen record.
      operationId: verifyImmunizationCertificate
      security:
        - GovHubApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nin
                - certificate_number
              properties:
                nin:
                  type: string
                  example: CM99021234567X
                certificate_number:
                  type: string
                  example: MOH-IMM-2026-000123
      responses:
        "200":
          description: Certificate verification result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                    example: true
                  certificate_number:
                    type: string
                    example: MOH-IMM-2026-000123
                  issued_by:
                    type: string
                    example: Ministry of Health
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    GovHubApiKey:
      type: apiKey
      in: header
      name: X-GovHub-API-Key
  schemas:
    ImmunizationStatus:
      type: object
      properties:
        nin:
          type: string
          example: CM99021234567X
        status:
          type: string
          enum:
            - COMPLETE
            - PARTIAL
            - NOT_FOUND
          example: COMPLETE
        last_updated:
          type: string
          format: date
          example: "2026-02-18"
        verified:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: RECORD_NOT_FOUND
        message:
          type: string
          example: No matching immunization record was found.
